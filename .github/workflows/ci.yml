name: CI  # 워크플로우 이름

on:  # 트리거 [push, pull_request, schedule, workflow_dispatch]
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/ci.yml"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/chanjinyeon/ci-cd-test

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars    # ${{ steps.vars.outputs.IMAGE_TAG }}로 참조
        # 다른 step에서 재사용 가능한 output으로 만들기 위해 $GITHUB_OUTPUT 파일에 기록
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest app

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${{ steps.vars.outputs.IMAGE_TAG }}|g" deploy/dev/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy/dev/deployment.yaml
          git commit -m "Update image tag to ${{ steps.vars.outputs.IMAGE_TAG }}" || exit 0
          git push
