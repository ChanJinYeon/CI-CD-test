kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitops-lab

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 31000
        hostPort: 31000
        listenAddress: "127.0.0.1"
        protocol: TCP

      - containerPort: 31001
        hostPort: 31001
        listenAddress: "127.0.0.1"
        protocol: TCP

      - containerPort: 31002
        hostPort: 31002
        listenAddress: "127.0.0.1"
        protocol: TCP

  - role: worker
  - role: worker
